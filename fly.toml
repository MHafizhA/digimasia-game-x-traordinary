# fly.toml — X-Celerate the Tree Backend (Fly.io)
app = "x-celerate-the-tree"
primary_region = "sin"   # Singapore — closest to Indonesia

[build]
  dockerfile = "apps/backend/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT     = "3001"

[http_service]
  internal_port       = 3001
  force_https         = true
  auto_stop_machines  = false        # Keep always-on for WebSockets
  auto_start_machines = true
  min_machines_running = 1

[[services.ports]]
  handlers = ["tls", "http"]
  port     = 443

[[services.ports]]
  handlers = ["http"]
  port     = 80

[checks]
  [checks.alive]
    grace_period = "30s"
    interval     = "15s"
    method       = "get"
    path         = "/health"
    port         = 3001
    timeout      = "10s"
    type         = "http"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
